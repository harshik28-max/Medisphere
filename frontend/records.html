<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Records – SmartQ Hospital</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <i class="fas fa-hospital-alt"></i>
        <span>Smart<span class="logo-accent">Q</span></span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="booking.html" class="nav-link">Booking</a>
        <div class="nav-user" id="nav-user">
          <span class="user-greeting" id="user-greeting"></span>
          <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
        </div>
      </nav>
      <div class="header-right">
        <div class="real-time-clock" id="real-time-clock"></div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <section class="records-page-section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">My Medical <span class="text-gradient">Records</span></h2>
        <p class="section-subtitle">View your complete medical history and prescriptions</p>
      </div>
      <div class="records-page-content" id="records-page-content">
        <p class="empty-state">Loading your records...</p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initRecordsPage();
    });
  </script>
</body>
</html>
